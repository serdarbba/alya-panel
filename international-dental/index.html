<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>International Dental Studio — WhatsApp Asistanı (Demo)</title>
<style>
  :root{ --wa-teal:#075e54; --wa-teal2:#128c7e; --wa-green:#25d366; --wa-bg:#efeae2; --wa-in:#ffffff; --wa-out:#d9fdd3; --wa-ink:#111b21; --wa-sub:#667781; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#0b141a; display:flex; justify-content:center; }
  .phone{ width:100%; max-width:460px; height:100dvh; display:flex; flex-direction:column; background:var(--wa-bg); position:relative; overflow:hidden; }
  /* header */
  .hdr{ background:var(--wa-teal); color:#fff; display:flex; align-items:center; gap:10px; padding:10px 12px; padding-top:calc(10px + env(safe-area-inset-top)); }
  .hdr .back{ font-size:22px; opacity:.9; }
  .hdr .ava{ width:40px; height:40px; border-radius:50%; background:#0a7d7d; display:grid; place-items:center; font-weight:700; font-size:15px; letter-spacing:.5px; }
  .hdr .who{ line-height:1.25; flex:1; min-width:0; }
  .hdr .who b{ font-size:15.5px; font-weight:600; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hdr .who span{ font-size:12px; color:#cfeee7; }
  .hdr .ico{ font-size:19px; opacity:.9; margin-left:4px; }
  .demoband{ background:#fff7d6; color:#7a5c00; font-size:11px; text-align:center; padding:5px 10px; border-bottom:1px solid #efe3ad; }
  /* chat */
  .chat{ flex:1; overflow-y:auto; padding:14px 10px 4px; background-image:linear-gradient(rgba(229,221,213,.6),rgba(229,221,213,.6)); background-color:var(--wa-bg); display:flex; flex-direction:column; gap:6px; }
  .row{ display:flex; }
  .row.in{ justify-content:flex-start; }
  .row.out{ justify-content:flex-end; }
  .msg{ max-width:80%; padding:6px 9px 7px; border-radius:8px; font-size:14.5px; line-height:1.4; color:var(--wa-ink); box-shadow:0 1px .5px rgba(11,20,26,.13); position:relative; white-space:pre-wrap; word-wrap:break-word; }
  .in .msg{ background:var(--wa-in); border-top-left-radius:2px; }
  .out .msg{ background:var(--wa-out); border-top-right-radius:2px; }
  .msg .t{ font-size:10.5px; color:var(--wa-sub); float:right; margin:6px -2px -2px 8px; }
  .out .msg .t .tick{ color:#53bdeb; font-weight:700; }
  .typing{ display:inline-flex; gap:3px; padding:3px 2px; }
  .typing i{ width:7px; height:7px; border-radius:50%; background:#9aa6ac; animation:bl 1.2s infinite; }
  .typing i:nth-child(2){ animation-delay:.2s } .typing i:nth-child(3){ animation-delay:.4s }
  @keyframes bl{ 0%,60%,100%{ opacity:.3; transform:translateY(0) } 30%{ opacity:1; transform:translateY(-3px) } }
  /* quick chips */
  .chips{ display:flex; gap:7px; overflow-x:auto; padding:8px 10px; background:var(--wa-bg); border-top:1px solid rgba(0,0,0,.05); scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; background:#fff; color:var(--wa-teal2); border:1px solid #cfe9e2; border-radius:16px; padding:7px 13px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .chip:active{ background:#eafaf4; }
  /* input */
  .bar{ display:flex; align-items:center; gap:8px; padding:8px 10px; padding-bottom:calc(8px + env(safe-area-inset-bottom)); background:var(--wa-bg); }
  .bar input{ flex:1; border:none; outline:none; background:#fff; border-radius:22px; padding:11px 15px; font-size:15px; }
  .bar .send{ width:46px; height:46px; border:none; border-radius:50%; background:var(--wa-teal2); color:#fff; font-size:19px; cursor:pointer; flex:0 0 auto; display:grid; place-items:center; }
  .bar .send:active{ background:var(--wa-teal); }
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <div class="back">‹</div>
    <div class="ava">ID</div>
    <div class="who"><b>International Dental Studio</b><span id="status">çevrimiçi</span></div>
    <div class="ico">📞</div><div class="ico">⋮</div>
  </div>
  <div class="demoband">BBA Teknoloji tanıtım demosu · örnek yanıtlar</div>
  <div class="chat" id="chat"></div>
  <div class="chips" id="chips"></div>
  <form class="bar" id="bar" autocomplete="off">
    <input id="inp" placeholder="Bir mesaj yazın" autocomplete="off">
    <button class="send" type="submit" aria-label="Gönder">➤</button>
  </form>
</div>
<script>
(function(){
  var chat=document.getElementById('chat'), chips=document.getElementById('chips'),
      inp=document.getElementById('inp'), bar=document.getElementById('bar'), statusEl=document.getElementById('status');
  var state='idle', appt={when:'',name:''};

  function now(){ var d=new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  function scroll(){ chat.scrollTop=chat.scrollHeight; }
  function bubble(text, who){
    var row=document.createElement('div'); row.className='row '+who;
    var m=document.createElement('div'); m.className='msg';
    m.innerHTML=text.replace(/&/g,'&amp;').replace(/</g,'&lt;')
      +'<span class="t">'+now()+(who==='out'?' <span class="tick">✓✓</span>':'')+'</span>';
    row.appendChild(m); chat.appendChild(row); scroll();
  }
  function typing(on){
    var ex=document.getElementById('typerow'); if(ex) ex.remove();
    statusEl.textContent = on ? 'yazıyor…' : 'çevrimiçi';
    if(on){ var r=document.createElement('div'); r.id='typerow'; r.className='row in';
      r.innerHTML='<div class="msg"><span class="typing"><i></i><i></i><i></i></span></div>';
      chat.appendChild(r); scroll(); }
  }
  function botSay(text, delay){
    typing(true);
    setTimeout(function(){ typing(false); bubble(text,'in'); }, delay||900);
  }
  function setChips(list){
    chips.innerHTML='';
    list.forEach(function(c){ var b=document.createElement('div'); b.className='chip'; b.textContent=c;
      b.onclick=function(){ handle(c); }; chips.appendChild(b); });
  }
  var START=['Randevu almak istiyorum','İmplant','Diş estetiği','Çalışma saatleri'];

  function reply(text){
    var q=text.toLocaleLowerCase('tr');
    // --- randevu akışı (rezervasyon alma) ---
    if(state==='await_when'){
      appt.when=text; state='await_name';
      setChips([]);
      return 'Harika! '+text+' için yerinizi ayırdım. 🗓️\nOnaylamak adına adınızı ve soyadınızı yazar mısınız?';
    }
    if(state==='await_name'){
      appt.name=text.replace(/\s+/g,' ').trim(); state='done';
      setChips(['Yeni randevu','Adres / yol tarifi','Teşekkürler']);
      return 'Teşekkürler '+appt.name+'! ✅\nRandevunuz onaylandı:\n📅 '+appt.when+'\n🏥 International Dental Studio\n\nSizi bekliyoruz. Değişiklik gerekirse buradan yazmanız yeterli — 7/24 buradayım.';
    }
    function has(){ for(var i=0;i<arguments.length;i++){ if(q.indexOf(arguments[i])>=0) return true; } return false; }

    if(has('randevu','rezervasyon','yer ayır','appointment','müsait','uygun mu')){
      state='await_when'; setChips(['Yarın 14:00','Yarın 16:30','Cumartesi 11:00']);
      return 'Tabii, hemen bir randevu oluşturalım. 🗓️\nHangi gün ve saat size uygun? Örneğin yarın 14:00, yarın 16:30 ya da cumartesi 11:00 uygun görünüyor.';
    }
    if(has('implant')){
      state='idle'; setChips(['Randevu almak istiyorum','Fiyat','Diş estetiği']);
      return 'İmplant tedavisi için önce kısa bir muayene ve röntgen öneriyoruz; ardından hekimimiz size özel tedavi planını ve süresini çıkarır. Dilerseniz hemen bir muayene randevusu oluşturayım — hangi gün uygundur?';
    }
    if(has('estetik','gülüş','zirkonyum','laminate','kaplama','gülüs')){
      state='idle'; setChips(['Randevu almak istiyorum','Fiyat','İmplant']);
      return 'Gülüş tasarımı, zirkonyum ve laminate kaplama ile ilgileniyorsunuz. 😊 Yüz yapınıza en uygun planı hekimimiz muayenede belirler. Size bir danışma randevusu ayarlayayım mı?';
    }
    if(has('ortodonti','tel','plak','diş teli','şeffaf')){
      state='idle'; setChips(['Randevu almak istiyorum','Fiyat']);
      return 'Ortodonti için metal tel ve şeffaf plak (invisalign tarzı) seçeneklerimiz var. Size en uygun yöntemi muayenede belirliyoruz. Randevu oluşturmamı ister misiniz?';
    }
    if(has('beyazlat','beyazlatma','ağartma')){
      state='idle'; setChips(['Randevu almak istiyorum','Fiyat']);
      return 'Diş beyazlatma işlemi genellikle tek seansta tamamlanır ve hemen fark yaratır. Size uygun bir randevu ayarlayayım mı?';
    }
    if(has('fiyat','ücret','ne kadar','kaç para','maliyet')){
      state='idle'; setChips(['Randevu almak istiyorum']);
      return 'Fiyat, tedavi planınıza göre değişir; net tutarı muayenede hekimimiz paylaşır. Dilerseniz önce kısa bir muayene randevusu oluşturayım — hangi gün uygundur?';
    }
    if(has('saat','açık','kaçta','çalışma','ne zaman açık')){
      state='idle'; setChips(['Randevu almak istiyorum']);
      return 'Randevuyla çalışıyoruz; size uygun gün ve saati birlikte belirleyelim. Hangi gün müsaitsiniz? Hemen yerinizi ayırayım.';
    }
    if(has('ağrı','acil','ağrıyor','sızlıyor','acıyor')){
      state='await_when'; setChips(['Bugün','Yarın sabah']);
      return 'Geçmiş olsun. 🙏 Acil durumlar için sizi en yakın uygun saate alalım. Bugün gelebilir misiniz, yoksa yarın sabah mı uygun?';
    }
    if(has('adres','yol','nerede','konum','ulaşım')){
      state='idle'; setChips(['Randevu almak istiyorum']);
      return 'Adres ve yol tarifini randevunuzu oluştururken paylaşıyoruz. Dilerseniz hemen bir randevu ayarlayayım, konum bilgisini de ileteyim.';
    }
    if(has('teşekkür','sağ ol','sagol','eyvallah')){
      return 'Rica ederim, her zaman buradayım. 😊 International Dental Studio olarak sağlıklı günler dileriz.';
    }
    if(has('merhaba','selam','iyi günler','günaydın')){
      state='idle'; setChips(START);
      return 'Merhaba, hoş geldiniz! 😊 Randevu, tedavi bilgisi ya da sorularınız için buradayım. Nasıl yardımcı olabilirim?';
    }
    if(has('yeni randevu')){
      state='await_when'; setChips(['Yarın 14:00','Yarın 16:30','Cumartesi 11:00']);
      return 'Tabii, yeni bir randevu oluşturalım. Hangi gün ve saat size uygun?';
    }
    state='idle'; setChips(START);
    return 'Bunu ekibimize iletebilirim. 🙂 Randevu oluşturma, implant, ortodonti, diş estetiği ya da beyazlatma konularında hemen yardımcı olabilirim — hangisini istersiniz?';
  }

  function handle(text){
    text=(text||'').trim(); if(!text) return;
    bubble(text,'out');
    var r=reply(text);
    botSay(r, 850+Math.min(text.length*12,700));
  }

  bar.addEventListener('submit',function(e){ e.preventDefault(); var v=inp.value; inp.value=''; handle(v); });

  // opening
  setChips(START);
  setTimeout(function(){ botSay('Merhaba, International Dental Studio\'ya hoş geldiniz! 😊 Ben dijital asistanınızım — randevu oluşturabilir, tedavi ve fiyat sorularınızı yanıtlayabilirim. Size nasıl yardımcı olabilirim?', 600); }, 350);
})();
</script>
</body>
</html>
