<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>WhatsApp Asistanı — Demo</title>
<style>
  :root{ --wa-teal:#075e54; --wa-teal2:#128c7e; --wa-bg:#efeae2; --wa-in:#fff; --wa-out:#d9fdd3; --wa-ink:#111b21; --wa-sub:#667781; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#0b141a; display:flex; justify-content:center; }
  .phone{ width:100%; max-width:460px; height:100dvh; display:flex; flex-direction:column; background:var(--wa-bg); overflow:hidden; }
  .hdr{ background:var(--wa-teal); color:#fff; display:flex; align-items:center; gap:10px; padding:10px 12px; padding-top:calc(10px + env(safe-area-inset-top)); }
  .hdr .back{ font-size:22px; opacity:.9; }
  .hdr .ava{ width:40px; height:40px; border-radius:50%; background:#0a7d7d; display:grid; place-items:center; font-weight:700; font-size:14px; }
  .hdr .who{ line-height:1.25; flex:1; min-width:0; }
  .hdr .who b{ font-size:15.5px; font-weight:600; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hdr .who span{ font-size:12px; color:#cfeee7; }
  .hdr .ico{ font-size:19px; opacity:.9; margin-left:4px; }
  .demoband{ background:#fff7d6; color:#7a5c00; font-size:11px; text-align:center; padding:5px 10px; border-bottom:1px solid #efe3ad; }
  .chat{ flex:1; overflow-y:auto; padding:14px 10px 4px; background:var(--wa-bg); display:flex; flex-direction:column; gap:6px; }
  .row{ display:flex; } .row.in{ justify-content:flex-start; } .row.out{ justify-content:flex-end; }
  .msg{ max-width:80%; padding:6px 9px 7px; border-radius:8px; font-size:14.5px; line-height:1.4; color:var(--wa-ink); box-shadow:0 1px .5px rgba(11,20,26,.13); white-space:pre-wrap; word-wrap:break-word; }
  .in .msg{ background:var(--wa-in); border-top-left-radius:2px; } .out .msg{ background:var(--wa-out); border-top-right-radius:2px; }
  .msg .t{ font-size:10.5px; color:var(--wa-sub); float:right; margin:6px -2px -2px 8px; }
  .out .msg .t .tick{ color:#53bdeb; font-weight:700; }
  .typing{ display:inline-flex; gap:3px; padding:3px 2px; }
  .typing i{ width:7px; height:7px; border-radius:50%; background:#9aa6ac; animation:bl 1.2s infinite; }
  .typing i:nth-child(2){ animation-delay:.2s } .typing i:nth-child(3){ animation-delay:.4s }
  @keyframes bl{ 0%,60%,100%{ opacity:.3; transform:translateY(0) } 30%{ opacity:1; transform:translateY(-3px) } }
  .chips{ display:flex; gap:7px; overflow-x:auto; padding:8px 10px; background:var(--wa-bg); border-top:1px solid rgba(0,0,0,.05); scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; background:#fff; color:var(--wa-teal2); border:1px solid #cfe9e2; border-radius:16px; padding:7px 13px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .chip:active{ background:#eafaf4; }
  .bar{ display:flex; align-items:center; gap:8px; padding:8px 10px; padding-bottom:calc(8px + env(safe-area-inset-bottom)); background:var(--wa-bg); }
  .bar input{ flex:1; border:none; outline:none; background:#fff; border-radius:22px; padding:11px 15px; font-size:15px; }
  .bar .send{ width:46px; height:46px; border:none; border-radius:50%; background:var(--wa-teal2); color:#fff; font-size:19px; cursor:pointer; flex:0 0 auto; display:grid; place-items:center; }
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <div class="back">‹</div>
    <div class="ava" id="ava">AI</div>
    <div class="who"><b id="bizname">İşletme</b><span id="status">çevrimiçi</span></div>
    <div class="ico">📞</div><div class="ico">⋮</div>
  </div>
  <div class="demoband">BBA Teknoloji tanıtım demosu · örnek yanıtlar</div>
  <div class="chat" id="chat"></div>
  <div class="chips" id="chips"></div>
  <form class="bar" id="bar" autocomplete="off">
    <input id="inp" placeholder="Bir mesaj yazın" autocomplete="off">
    <button class="send" type="submit" aria-label="Gönder">➤</button>
  </form>
</div>
<script>
(function(){
  // ---- URL: ?ad=İşletme Adı&tur=klinik|kuafor|restoran|su|otel ----
  var P=new URLSearchParams(location.search);
  var NAME=(P.get('ad')||'İşletmeniz').trim();
  var TUR=(P.get('tur')||'klinik').trim().toLowerCase();
  var ADRES=(P.get('adres')||'').trim(); // opsiyonel: ?adres=... verilirse onu gösterir

  // ---- Sektör senaryoları ----
  var S={
    klinik:{
      open:'randevu oluşturabilir, tedavi ve fiyat sorularınızı yanıtlayabilirim',
      chips:['Randevu almak istiyorum','İmplant','Diş estetiği','Çalışma saatleri'],
      book:{trig:['randevu','rezervasyon','muayene','müsait','yer ayır'], slots:['Yarın 14:00','Yarın 16:30','Cumartesi 11:00'],
            ask:'Tabii, hemen bir randevu oluşturalım. 🗓️ Hangi gün ve saat size uygun?', label:'Randevunuz', emo:'🏥'},
      rules:[
        {k:['implant'],a:'İmplant için önce kısa bir muayene ve röntgen öneriyoruz; ardından hekimimiz size özel planı çıkarır. Hemen bir muayene randevusu oluşturayım mı — hangi gün uygundur?',c:['Randevu almak istiyorum','Fiyat']},
        {k:['estetik','gülüş','zirkonyum','laminate','kaplama'],a:'Gülüş tasarımı, zirkonyum ve laminate kaplama ile ilgileniyorsunuz. 😊 En uygun planı hekimimiz muayenede belirler. Danışma randevusu ayarlayayım mı?',c:['Randevu almak istiyorum','Fiyat']},
        {k:['ortodonti','tel','plak','şeffaf'],a:'Ortodonti için metal tel ve şeffaf plak seçeneklerimiz var. Uygun yöntemi muayenede belirliyoruz. Randevu oluşturayım mı?',c:['Randevu almak istiyorum']},
        {k:['beyazlat','ağart'],a:'Diş beyazlatma genelde tek seansta tamamlanır. Size uygun bir randevu ayarlayayım mı?',c:['Randevu almak istiyorum']},
        {k:['fiyat','ücret','ne kadar','kaç para'],a:'Fiyat tedavi planına göre değişir; net tutarı muayenede hekimimiz paylaşır. Önce kısa bir muayene randevusu oluşturayım mı?',c:['Randevu almak istiyorum']},
        {k:['ağrı','acil','acıyor','sızlı'],a:'Geçmiş olsun. 🙏 Sizi en yakın uygun saate alalım — bugün mü, yarın sabah mı uygun?',c:['Bugün','Yarın sabah']},
        {k:['saat','açık','çalışma'],a:'Randevuyla çalışıyoruz; size uygun gün ve saati birlikte belirleyelim. Hangi gün müsaitsiniz?',c:['Randevu almak istiyorum']},
        {k:['ilk muayene','danışma','ücretsiz mi','ilk kontrol','muayene ücret'],a:'İlk muayenede durumunuzu değerlendirip size özel bir tedavi planı çıkarıyoruz. Detayları hekimimiz görüşmede netleştirir. Size bir muayene randevusu oluşturayım mı?',c:['Randevu almak istiyorum']},
        {k:['çocuk','pedodonti','çocuğum'],a:'Çocuk diş sağlığı (pedodonti) hizmetimiz var 😊 Çocuğunuz için de randevu oluşturabilirim. Hangi gün uygundur?',c:['Randevu almak istiyorum']},
        {k:['sigorta','sgk','anlaşmalı','özel sigorta'],a:'Sigorta ve ödeme detaylarını görüşmede netleştiriyoruz. Dilerseniz önce kısa bir muayene randevusu oluşturayım.',c:['Randevu almak istiyorum']},
        {k:['kaç seans','ne kadar sürer','süre','kaç gün'],a:'Tedavi süresi ve seans sayısı ağız yapınıza göre muayenede belirlenir. Net bir plan için size randevu oluşturayım mı?',c:['Randevu almak istiyorum']}
      ]
    },
    kuafor:{
      open:'randevu oluşturabilir, hizmet ve fiyat sorularınızı yanıtlayabilirim',
      chips:['Randevu almak istiyorum','Saç boyası','Gelin paketi','Çalışma saatleri'],
      book:{trig:['randevu','rezervasyon','müsait','yer ayır'], slots:['Bugün 15:00','Yarın 13:00','Yarın 17:30'],
            ask:'Tabii! ✂️ Hangi gün ve saat size uygun?', label:'Randevunuz', emo:'💇'},
      rules:[
        {k:['boya','renk','ombre','balyaj'],a:'Renk ve bakım için önce kısa bir danışma öneriyoruz; sonucu birlikte planlarız. Randevu oluşturayım mı?',c:['Randevu almak istiyorum','Fiyat']},
        {k:['gelin','düğün','özel gün','makyaj'],a:'Gelin saçı ve makyajı için özel paketlerimiz var. 👰 Tarihinizi paylaşın, uygunluğu hemen kontrol edeyim.',c:['Randevu almak istiyorum']},
        {k:['kesim','fön','bakım','keratin'],a:'Kesim, fön ve bakım için size uygun bir saat ayarlayabilirim. Hangi gün müsaitsiniz?',c:['Randevu almak istiyorum']},
        {k:['fiyat','ücret','ne kadar'],a:'Fiyat hizmete göre değişir, salonda netleştiriyoruz. Önce bir randevu ayarlayayım mı?',c:['Randevu almak istiyorum']},
        {k:['saat','açık','çalışma'],a:'Salı–Pazar hizmet veriyoruz; size uygun saati birlikte belirleyelim. Hangi gün müsaitsiniz?',c:['Randevu almak istiyorum']}
      ]
    },
    restoran:{
      open:'masa rezervasyonu alabilir, menü ve paket sipariş sorularınızı yanıtlayabilirim',
      chips:['Masa ayırtmak istiyorum','Menüde ne var','Paket servis','Çalışma saatleri'],
      book:{trig:['rezervasyon','masa','yer ayır','rezerve','müsait'], slots:['Bugün 20:00','Yarın 19:30','Cumartesi 21:00'],
            ask:'Tabii! 🍽️ Kaç kişilik ve hangi gün/saat için ayıralım?', label:'Rezervasyonunuz', emo:'🍽️'},
      rules:[
        {k:['menü','yemek','öner','ne var','tavsiye'],a:'En çok sevilen tabaklarımızdan başlayabiliriz. 😊 Damak tadınıza göre öneri yapayım — özel bir tercihiniz (vejetaryen, vegan, glutensiz vb.) var mı?',c:['Masa ayırtmak istiyorum']},
        {k:['paket','eve','sipariş','gel al'],a:'Paket servisimiz var. 🛵 Adresinizi paylaşırsanız bölge uygunluğunu ve tahmini süreyi söyleyeyim.',c:['Masa ayırtmak istiyorum']},
        {k:['fiyat','ücret','ne kadar'],a:'Menü fiyatlarımızı paylaşabilirim; dilerseniz önce bir masa ayırtayım. Hangi gün/saat uygun?',c:['Masa ayırtmak istiyorum']},
        {k:['saat','açık','çalışma'],a:'Her gün hizmet veriyoruz. Rezervasyon ya da paket için hemen yardımcı olayım mı?',c:['Masa ayırtmak istiyorum']}
      ]
    },
    su:{
      open:'sipariş alabilir, teslimat ve abonelik sorularınızı yanıtlayabilirim',
      chips:['Su siparişi vermek istiyorum','Ne zaman gelir','Düzenli abonelik','Fiyat'],
      book:{trig:['sipariş','ver','damacana','su','istiyorum'], slots:['Bugün öğleden sonra','Bugün akşam','Yarın sabah'],
            ask:'Tabii! 💧 Kaç damacana istersiniz ve hangi zaman aralığı uygun?', label:'Siparişiniz', emo:'💧'},
      rules:[
        {k:['ne zaman','teslimat','gelir','kaçta'],a:'Bölgenize bugün içinde teslimat yapabiliriz. 🚚 Adresinizi yazın, saat aralığını netleştireyim.',c:['Su siparişi vermek istiyorum']},
        {k:['abone','düzenli','haftalık','her'],a:'Haftalık ya da 15 günde bir otomatik teslimat kurabiliriz; siz hiç uğraşmazsınız. Sizin için ayarlayayım mı?',c:['Su siparişi vermek istiyorum']},
        {k:['fiyat','ücret','ne kadar','kaç para'],a:'Fiyat damacana ve abonelik seçeneğine göre değişir. Kaç damacana ve hangi sıklıkta istersiniz, net fiyat vereyim.',c:['Su siparişi vermek istiyorum']}
      ]
    },
    otel:{
      open:'rezervasyon alabilir, oda ve tesis sorularınızı yanıtlayabilirim',
      chips:['Rezervasyon yapmak istiyorum','Odalar','Spa & Havuz','Transfer'],
      book:{trig:['rezervasyon','oda','müsait','yer ayır','konaklama'], slots:['Bu hafta sonu','Gelecek hafta','Belirli tarih'],
            ask:'Tabii! 🏨 Hangi tarihler ve kaç kişi için bakalım?', label:'Rezervasyonunuz', emo:'🏨'},
      rules:[
        {k:['oda','fiyat','gecelik'],a:'Standart, deluxe ve suit oda seçeneklerimiz var. Tarihlerinizi paylaşın, uygunluk ve fiyatı ileteyim.',c:['Rezervasyon yapmak istiyorum']},
        {k:['spa','havuz','wellness','masaj'],a:'Spa, havuz ve wellness imkanlarımız mevcut. Konaklamanıza ekleyebilirim — rezervasyon oluşturayım mı?',c:['Rezervasyon yapmak istiyorum']},
        {k:['transfer','havaalanı','ulaşım'],a:'Havaalanı transferi düzenleyebiliriz. Uçuş bilginizi paylaşın, aracı planlayayım.',c:['Rezervasyon yapmak istiyorum']}
      ]
    }
  };
  var cfg=S[TUR]||S.klinik;

  // ---- UI ----
  var chat=document.getElementById('chat'), chips=document.getElementById('chips'),
      inp=document.getElementById('inp'), bar=document.getElementById('bar'),
      statusEl=document.getElementById('status');
  document.getElementById('bizname').textContent=NAME;
  document.title=NAME+' — WhatsApp Asistanı (Demo)';
  document.getElementById('ava').textContent=NAME.replace(/[^A-Za-zÇĞİÖŞÜçğıöşü ]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase()||'AI';

  var state='idle', book={when:'',name:''};
  function now(){ var d=new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
  function scroll(){ chat.scrollTop=chat.scrollHeight; }
  function bubble(text,who){
    var row=document.createElement('div'); row.className='row '+who;
    var m=document.createElement('div'); m.className='msg';
    m.innerHTML=text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'<span class="t">'+now()+(who==='out'?' <span class="tick">✓✓</span>':'')+'</span>';
    row.appendChild(m); chat.appendChild(row); scroll();
  }
  function typing(on){
    var ex=document.getElementById('typerow'); if(ex) ex.remove();
    statusEl.textContent=on?'yazıyor…':'çevrimiçi';
    if(on){ var r=document.createElement('div'); r.id='typerow'; r.className='row in';
      r.innerHTML='<div class="msg"><span class="typing"><i></i><i></i><i></i></span></div>'; chat.appendChild(r); scroll(); }
  }
  function botSay(t,d){ typing(true); setTimeout(function(){ typing(false); bubble(t,'in'); }, d||900); }
  function setChips(list){ chips.innerHTML=''; (list||[]).forEach(function(c){ var b=document.createElement('div'); b.className='chip'; b.textContent=c; b.onclick=function(){ handle(c); }; chips.appendChild(b); }); }

  function reply(text){
    var q=text.toLocaleLowerCase('tr');
    if(state==='await_when'){ book.when=text; state='await_name'; setChips([]);
      return 'Harika! '+text+' için yerinizi ayırdım. '+cfg.book.emo+'\nOnaylamak adına adınızı yazar mısınız?'; }
    if(state==='await_name'){ book.name=text.replace(/\s+/g,' ').trim(); state='done';
      setChips(['Ön ödeme linki','Adres / konum','Teşekkürler']);
      return 'Teşekkürler '+book.name+'! ✅\n'+cfg.book.label+' onaylandı:\n📅 '+book.when+'\n'+cfg.book.emo+' '+NAME+(ADRES?'\n📍 '+ADRES:'')+'\n\nYerinizi garantilemek isterseniz güvenli bir ön ödeme linki gönderebilirim 💳 Değişiklik için buradan yazmanız yeterli — 7/24 buradayım.'; }
    function has(){ for(var i=0;i<arguments.length;i++){ if(q.indexOf(arguments[i])>=0) return true; } return false; }
    if(has.apply(null,cfg.book.trig)){ state='await_when'; setChips(cfg.book.slots); return cfg.book.ask+' Örneğin: '+cfg.book.slots.join(', ')+'.'; }
    for(var i=0;i<cfg.rules.length;i++){ if(has.apply(null,cfg.rules[i].k)){ state='idle'; setChips(cfg.rules[i].c||cfg.chips); return cfg.rules[i].a; } }
    // --- klasik sorular: HER durumda doğru cevap (randevu sonrası dahil) ---
    if(has('ön ödeme','ödeme linki','ödeme yap','link gönder','kapora','kaparo')){ setChips(cfg.chips);
      return '💳 Güvenli ödeme linkiniz hazır:\n🔗 pay.bbateknoloji.com/odeme\n\nKartla güvenle ödeyebilirsiniz; ödeme tamamlanınca kaydınız otomatik kesinleşir ve onay mesajı gönderilir.'; }
    if(has('öde','ödeme','nakit','kart','kredi','taksit','havale','iban','para')){ setChips(cfg.chips);
      return 'Elbette 💳 Nakit, kredi kartı ve güvenli online ödeme kabul ediyoruz. Dilerseniz hemen bir ödeme/ön ödeme linki gönderebilirim — yerinizi anında garantiler, taksit de mümkün.'; }
    if(has('adres','yol','nerede','konum','ulaşım','harita','otopark','park','tarif')){ setChips(cfg.chips);
      return (ADRES?'📍 Adresimiz: '+ADRES+'. ':'📍 Şehir merkezinde, kolay ulaşılır bir konumdayız, otoparkımız mevcut. ')+'Yol tarifi ve konumu hemen paylaşıyorum 📎'; }
    if(has('iptal','ertele','değiştir','vazgeç')){ setChips(cfg.chips);
      return 'Tabii, hiç sorun değil 🙂 buradan yazmanız yeterli, kaydınızı hemen güncellerim.'; }
    if(has('telefon','numara','iletişim')){ setChips(cfg.chips);
      return 'Buradan 7/24 yazabilirsiniz, en hızlı yanıtı buradan alırsınız 📱'; }
    if(has('merhaba','selam','iyi günler','günaydın','yeni talep')){ state='idle'; setChips(cfg.chips);
      return 'Merhaba, hoş geldiniz! 😊 Size nasıl yardımcı olabilirim?'; }
    if(has('teşekkür','sağ ol','sagol','eyvallah')){ return 'Rica ederim, her zaman buradayım. 😊 '+NAME+' olarak iyi günler dileriz.'; }
    state='idle'; setChips(cfg.chips);
    return 'Bunu ekibimize iletebilirim. 🙂 '+cfg.chips.slice(0,3).join(', ')+' gibi konularda hemen yardımcı olabilirim — hangisini istersiniz?';
  }
  function handle(text){ text=(text||'').trim(); if(!text) return; bubble(text,'out'); var r=reply(text); botSay(r, 800+Math.min(text.length*12,700)); }
  bar.addEventListener('submit',function(e){ e.preventDefault(); var v=inp.value; inp.value=''; handle(v); });

  setChips(cfg.chips);
  setTimeout(function(){ botSay('Merhaba, '+NAME+'\'a hoş geldiniz! 😊 Ben dijital asistanınızım — '+cfg.open+'. Size nasıl yardımcı olabilirim?', 500); }, 300);
})();
</script>
</body>
</html>
